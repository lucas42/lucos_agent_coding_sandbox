# Lima VM configuration for the lucOS agent coding sandbox.
#
# Purpose: An isolated environment for running Claude Code with access to
# lucas42 GitHub repositories, but no access to the host machine or its
# credentials. The VM is persistent (not ephemeral) so work survives reboots.
#
# Key design decisions:
# - No host directory mounts: isolation from the host is the entire point.
#   Claude cannot reach host credentials, SSH keys, or any local data.
# - SSH agent forwarding disabled: Claude must use its own dedicated key.
# - vmType vz: best performance on Apple Silicon (macOS 13.5+).
# - Ubuntu 24.04 LTS: stable, well-supported, long EOL (April 2029).
# - setup-repos.sh is written using mode:data provision to avoid YAML/heredoc
#   nesting issues that arise when embedding shell scripts with heredocs.
#
# To create the VM:
#   brew install lima
#   limactl start --name lucos-coding-sandbox ~/sandboxes/lucos_agent_coding_sandbox/lima.yaml
#
# After the VM is running, complete setup:
#   limactl shell lucos-coding-sandbox
#   ~/setup-repos.sh

minimumLimaVersion: "2.0.0"

vmType: vz

images:
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-amd64.img"
    arch: "x86_64"
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-arm64.img"
    arch: "aarch64"

cpus: 4
memory: "8GiB"
disk: "100GiB"

# No host mounts — isolation is the entire point of this VM.
# Claude Code runs inside the VM with no path to the host filesystem.
mounts: []

networks:
  - vzNAT: true

# SSH agent forwarding deliberately disabled.
# Claude inside the VM must use its own dedicated SSH key, not the host's.
ssh:
  forwardAgent: false

containerd:
  system: false
  user: false

provision:
  # -------------------------------------------------------------------------
  # System-level: install required packages
  # -------------------------------------------------------------------------
  - mode: system
    script: |
      #!/bin/bash
      set -euo pipefail
      export DEBIAN_FRONTEND=noninteractive

      apt-get update -q
      apt-get install -y -q \
        git \
        curl \
        wget \
        unzip \
        build-essential \
        openssh-client \
        ca-certificates \
        gnupg \
        jq \
        python3 \
        python3-pip \
        python3-venv

      # Enable x86_64 emulation on aarch64 hosts.
      # Android build-tools (aapt2) and platform-tools (adb) ship as dynamically
      # linked x86_64 ELF binaries — they will not execute on a native aarch64 kernel
      # without this setup. The JVM-based SDK tools (sdkmanager, d8, apksigner) work
      # fine on aarch64 without emulation.
      #
      # The approach: qemu-user-static registers a binfmt interpreter for x86_64 ELF
      # binaries, and libc6:amd64 supplies the x86_64 glibc that the binaries link
      # against. Together they allow transparent x86_64 emulation for individual
      # processes — no x86_64 container or VM required.
      #
      # Multiarch setup (aarch64 only — this block is a no-op on x86_64 VMs):
      # - dpkg foreign architecture amd64 is registered so apt can install :amd64 packages
      # - ubuntu.sources is constrained to arm64 to avoid sending amd64 requests to
      #   ports.ubuntu.com (which only carries arm64 packages and returns 404 for amd64)
      # - a separate ubuntu-amd64.sources is added pointing to archive.ubuntu.com
      #   (the standard Ubuntu mirror that carries amd64 packages)
      if [ "$(uname -m)" = "aarch64" ]; then
        if ! dpkg --print-foreign-architectures | grep -q amd64; then
          dpkg --add-architecture amd64

          # Constrain the cloud-init-generated ubuntu.sources to arm64 only.
          # ports.ubuntu.com does not carry amd64 packages and returns 404 if asked.
          # We use sed to insert 'Architectures: arm64' after each 'Types: deb' line.
          sed -i '/^Types: deb/a Architectures: arm64' /etc/apt/sources.list.d/ubuntu.sources

          # Add a separate amd64 source pointing to the standard Ubuntu archive.
          # (Written with printf to avoid heredoc indentation issues in YAML.)
          printf '%s\n' \
            'Types: deb' \
            'URIs: http://archive.ubuntu.com/ubuntu' \
            'Suites: noble noble-updates noble-security' \
            'Components: main universe restricted multiverse' \
            'Architectures: amd64' \
            'Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg' \
            > /etc/apt/sources.list.d/ubuntu-amd64.sources

          apt-get update -q
          apt-get install -y -q qemu-user-static libc6:amd64
        fi
      fi

      # Install Node.js 22 LTS via NodeSource
      if ! command -v node &>/dev/null; then
        curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
        apt-get install -y nodejs
      fi

      # Install GitHub CLI
      if ! command -v gh &>/dev/null; then
        curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
          | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
        chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
          | tee /etc/apt/sources.list.d/github-cli.list > /dev/null
        apt-get update -q
        apt-get install -y gh
      fi

      # Install Go from the official tarball.
      # Ubuntu 24.04's apt package is Go 1.22, but lucos projects require >= 1.23
      # (lucos_creds uses golang:1.26). We install from the upstream tarball to
      # get a current, reproducible version. Architecture is detected at runtime
      # so this script works on both x86_64 (amd64) and aarch64 (arm64) VMs.
      # dpkg --print-architecture returns 'amd64' or 'arm64', matching Go's naming.
      GO_VERSION="1.26.0"
      if [ ! -d /usr/local/go ] || ! /usr/local/go/bin/go version 2>/dev/null | grep -q "go${GO_VERSION}"; then
        GOARCH=$(dpkg --print-architecture)
        curl -fsSL "https://go.dev/dl/go${GO_VERSION}.linux-${GOARCH}.tar.gz" -o /tmp/go.tar.gz
        rm -rf /usr/local/go
        tar -C /usr/local -xzf /tmp/go.tar.gz
        rm /tmp/go.tar.gz
        echo 'export PATH=$PATH:/usr/local/go/bin' > /etc/profile.d/go.sh
        chmod +x /etc/profile.d/go.sh
      fi

      # Install JDK 17 (required by Gradle and Android build tools).
      # openjdk-17-jdk is available in Ubuntu 24.04's standard repos and is the
      # minimum version required by current Android Gradle Plugin.
      if ! dpkg -s openjdk-17-jdk &>/dev/null; then
        apt-get install -y -q openjdk-17-jdk
      fi

      # Install Android SDK command-line tools.
      # We use the headless command-line tools only — no Android Studio.
      # The zip is JVM-based and architecture-independent (works on x86_64 and aarch64).
      # ANDROID_HOME is /opt/android-sdk; sdkmanager installs components beneath it.
      # We pin the command-line tools version for reproducibility; update when newer
      # SDK components require it.
      ANDROID_SDK_ROOT="/opt/android-sdk"
      CMDLINE_TOOLS_VERSION="14742923"
      CMDLINE_TOOLS_ZIP="commandlinetools-linux-${CMDLINE_TOOLS_VERSION}_latest.zip"
      if [ ! -d "${ANDROID_SDK_ROOT}/cmdline-tools/latest" ]; then
        mkdir -p "${ANDROID_SDK_ROOT}/cmdline-tools"
        curl -fsSL "https://dl.google.com/android/repository/${CMDLINE_TOOLS_ZIP}" \
          -o "/tmp/${CMDLINE_TOOLS_ZIP}"
        unzip -q "/tmp/${CMDLINE_TOOLS_ZIP}" -d "/tmp/cmdline-tools-extracted"
        # The zip extracts to 'cmdline-tools/', rename to 'latest' as sdkmanager expects
        mv "/tmp/cmdline-tools-extracted/cmdline-tools" "${ANDROID_SDK_ROOT}/cmdline-tools/latest"
        rm -rf "/tmp/${CMDLINE_TOOLS_ZIP}" "/tmp/cmdline-tools-extracted"

        # Set ANDROID_HOME for subsequent sdkmanager calls within this script
        export ANDROID_HOME="${ANDROID_SDK_ROOT}"
        export PATH="${PATH}:${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin:${ANDROID_SDK_ROOT}/platform-tools"

        # Accept all SDK licences non-interactively, then install:
        # - platform-tools (adb, etc.)
        # - build-tools 34.0.0 (matches API 34)
        # - platforms;android-34 (API 34 platform)
        # - build-tools 35.0.0 (required by Android Gradle Plugin automatically)
        # - build-tools 36.0.0 (matches API 36)
        # - platforms;android-36 (API 36 platform — required by lucos_photos_android compileSdk = 36)
        yes | "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null 2>&1 || true
        "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" \
          "platform-tools" \
          "build-tools;34.0.0" \
          "build-tools;35.0.0" \
          "build-tools;36.0.0" \
          "platforms;android-34" \
          "platforms;android-36"

        # Make the SDK directory world-readable so the unprivileged Lima user can use it
        chmod -R a+rX "${ANDROID_SDK_ROOT}"
      fi

      # Export ANDROID_HOME and add SDK tools to PATH for all users
      cat > /etc/profile.d/android-sdk.sh << 'ANDROID_EOF'
export ANDROID_HOME="/opt/android-sdk"
export PATH="$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools"
ANDROID_EOF
      chmod +x /etc/profile.d/android-sdk.sh

      # Install PHP 8.4 + Composer for testing PHP projects (e.g. lucos_media_metadata_manager).
      # Ubuntu 24.04 ships PHP 8.3 only; ondrej/php PPA is the standard way to get 8.4.
      # Extensions installed: xml and mbstring (required by PHPUnit); curl and zip (common).
      # Composer is installed to /usr/local/bin so all users can run `composer install`.
      if ! command -v php &>/dev/null || ! php --version 2>/dev/null | grep -q "PHP 8\.4"; then
        add-apt-repository -y ppa:ondrej/php
        apt-get update -q
        apt-get install -y -q php8.4-cli php8.4-xml php8.4-mbstring php8.4-curl php8.4-zip
      fi
      if ! command -v composer &>/dev/null; then
        curl -fsSL https://getcomposer.org/installer -o /tmp/composer-setup.php
        php /tmp/composer-setup.php --install-dir=/usr/local/bin --filename=composer --quiet
        rm -f /tmp/composer-setup.php
      fi

      # Install Docker Engine + Docker Compose v2 (CLI plugin) via official apt repo.
      # We use the Docker-maintained repository rather than Ubuntu's docker.io package,
      # which is often significantly behind upstream and doesn't include compose v2.
      # compose v2 is the 'docker compose' CLI plugin (not the standalone docker-compose).
      if ! command -v docker &>/dev/null; then
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
          | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        chmod a+r /etc/apt/keyrings/docker.gpg
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" \
          | tee /etc/apt/sources.list.d/docker.list > /dev/null
        apt-get update -q
        apt-get install -y -q \
          docker-ce \
          docker-ce-cli \
          containerd.io \
          docker-buildx-plugin \
          docker-compose-plugin
        systemctl enable docker
      fi

      # Add the VM user to the docker group so docker commands work without sudo.
      # Lima exposes the primary user as {{.User}}; we use the shell variable directly.
      LIMA_USER=$(id -nu 1000 2>/dev/null || echo "")
      if [ -n "$LIMA_USER" ] && ! id -nG "$LIMA_USER" | grep -qw docker; then
        usermod -aG docker "$LIMA_USER"
      fi

  # -------------------------------------------------------------------------
  # Fix DNS: prevent the LAN router (picked up via DHCP on eth0) from being
  # used as a resolver. That router silently drops AAAA responses, causing all
  # IPv6 DNS lookups to time out. The Lima host gateway (host.lima.internal)
  # is used instead and responds correctly to AAAA queries.
  #
  # The Lima host gateway IP is NOT hardcoded — it can change after host
  # software updates. Instead, a systemd service reads it from /etc/hosts
  # (which Lima updates on every boot) and writes it to resolved.conf.d
  # before systemd-resolved starts.
  #
  # Four-part fix:
  # 1. Remove any hardcoded nameserver from the cloud-init netplan.
  # 2. Add a netplan override (99-dns-override.yaml) that sets use-dns=false
  #    and use-domains=false on eth0 — prevents DHCP from supplying DNS.
  # 3. Install update-dns-from-lima-host.service, which runs before
  #    systemd-resolved on every boot and writes the current host.lima.internal
  #    IP as the DNS= value in resolved.conf.d/10-no-dhcp-dns.conf.
  # 4. Disable cloud-init network config management so these changes survive
  #    reboots and cloud-init re-runs.
  # -------------------------------------------------------------------------
  - mode: system
    script: |
      #!/bin/bash
      set -euo pipefail

      # Remove the hardcoded 192.168.5.2 nameserver from the cloud-init netplan.
      # cloud-init writes this on first boot; we scrub it here so it doesn't
      # persist after the initial provision run.
      python3 -c "
      import yaml, sys
      with open('/etc/netplan/50-cloud-init.yaml', 'r') as f:
          config = yaml.safe_load(f)
      eth0 = config['network']['ethernets'].get('eth0', {})
      if 'nameservers' in eth0:
          del eth0['nameservers']
      with open('/etc/netplan/50-cloud-init.yaml', 'w') as f:
          f.write(yaml.dump(config, default_flow_style=False))
      "

      # Prevent cloud-init from re-adding the nameserver on future boots.
      echo 'network: {config: disabled}' > /etc/cloud/cloud.cfg.d/99-disable-network-config.cfg

      # Add a netplan override to:
      # - disable eth0 DHCP DNS (belt-and-suspenders: even if the DHCP server
      #   offers 192.168.5.2, we won't use it).
      # - add 8.8.8.8/8.8.4.4 as fallback DNS for lima0, so that if the Lima
      #   DNS proxy (192.168.64.1) is unavailable, resolution still works.
      cat > /etc/netplan/99-dns-override.yaml << 'NETPLAN_EOF'
      network:
        version: 2
        ethernets:
          eth0:
            dhcp4-overrides:
              use-dns: false
              use-domains: false
          lima0:
            nameservers:
              addresses:
                - 8.8.8.8
                - 8.8.4.4
      NETPLAN_EOF
      chmod 600 /etc/netplan/99-dns-override.yaml
      # Strip the leading indentation introduced by the YAML heredoc context.
      sed -i 's/^      //' /etc/netplan/99-dns-override.yaml

      # Set the Lima host gateway as the global DNS fallback.
      # We do NOT hardcode the IP — Lima updates /etc/hosts with the current
      # host.lima.internal IP on every boot, so we read it from there at boot time
      # via a systemd service that runs before systemd-resolved starts.
      mkdir -p /etc/systemd/resolved.conf.d

      # Create the boot-time script that reads host.lima.internal from /etc/hosts
      # and writes the resolved config with the current IP.
      cat > /usr/local/sbin/update-dns-from-lima-host.sh << 'UPDATEDNS_EOF'
      #!/bin/bash
      # Reads the current IP of host.lima.internal from /etc/hosts (written by Lima
      # on every boot) and writes it as the DNS= value in systemd-resolved config.
      # This avoids hardcoding an IP that may change after host software updates.
      set -euo pipefail
      LIMA_HOST_IP=$(awk '/[[:space:]]host\.lima\.internal([[:space:]]|$)/ { print $1; exit }' /etc/hosts)
      if [ -z "$LIMA_HOST_IP" ]; then
        echo "update-dns-from-lima-host: host.lima.internal not found in /etc/hosts, leaving DNS config unchanged" >&2
        exit 0
      fi
      mkdir -p /etc/systemd/resolved.conf.d
      printf '[Resolve]\nDNS=%s\n' "$LIMA_HOST_IP" > /etc/systemd/resolved.conf.d/10-no-dhcp-dns.conf
      echo "update-dns-from-lima-host: set DNS to $LIMA_HOST_IP"
      UPDATEDNS_EOF
      # Strip the leading indentation.
      sed -i 's/^      //' /usr/local/sbin/update-dns-from-lima-host.sh
      chmod 755 /usr/local/sbin/update-dns-from-lima-host.sh

      # Create a systemd unit that runs the script before systemd-resolved starts.
      cat > /etc/systemd/system/update-dns-from-lima-host.service << 'UNIT_EOF'
      [Unit]
      Description=Update systemd-resolved DNS from host.lima.internal /etc/hosts entry
      Before=systemd-resolved.service
      After=local-fs.target
      DefaultDependencies=no

      [Service]
      Type=oneshot
      ExecStart=/usr/local/sbin/update-dns-from-lima-host.sh
      RemainAfterExit=yes

      [Install]
      WantedBy=sysinit.target
      UNIT_EOF
      # Strip the leading indentation.
      sed -i 's/^      //' /etc/systemd/system/update-dns-from-lima-host.service

      systemctl daemon-reload
      systemctl enable update-dns-from-lima-host.service

      # Run the script now (initial provision) to write the resolved config.
      /usr/local/sbin/update-dns-from-lima-host.sh

      # Apply the new DNS configuration.
      netplan apply
      systemctl restart systemd-resolved

  # -------------------------------------------------------------------------
  # Deploy setup-repos.sh to the user's home directory.
  # Lima embeds the file content at instance creation time, so the host file
  # does not need to be accessible after the VM is running.
  # -------------------------------------------------------------------------
  - mode: data
    path: "{{.Home}}/setup-repos.sh"
    file: setup-repos.sh
    owner: "{{.User}}"
    permissions: "0755"

  # -------------------------------------------------------------------------
  # Deploy ssh/known_hosts to the user's home directory.
  # This is used by the user provision step below to populate ~/.ssh/known_hosts
  # on every boot, not just at initial setup.
  # -------------------------------------------------------------------------
  - mode: data
    path: "{{.Home}}/ssh/known_hosts"
    file: ssh/known_hosts
    owner: "{{.User}}"
    permissions: "0644"

  # -------------------------------------------------------------------------
  # User-level: configure git identity and defaults
  # -------------------------------------------------------------------------
  - mode: user
    script: |
      #!/bin/bash
      set -euo pipefail

      # No global git identity is set. Every persona must supply identity
      # explicitly via `git -c user.name=... -c user.email=...` on each
      # commit-writing command. A bare `git commit` without -c flags will fail
      # with "Author identity unknown" — this is intentional; it turns a
      # silent misattribution into a loud, obvious error.

      # Install Claude Code in a user-writable npm global prefix.
      # This is intentionally done as the user (not root) so that Claude's
      # auto-update mechanism can write to the install directory without
      # permission errors. The prefix is ~/.npm-global, and its bin directory
      # is added to PATH in ~/.profile.
      if ! command -v claude &>/dev/null; then
        mkdir -p "$HOME/.npm-global"
        npm config set prefix "$HOME/.npm-global"
        npm install -g @anthropic-ai/claude-code
        # Add ~/.npm-global/bin to PATH for login shells
        if ! grep -q '.npm-global' "$HOME/.profile"; then
          printf '\n# npm global prefix — user-writable, allows claude auto-update\nif [ -d "$HOME/.npm-global/bin" ] ; then\n    PATH="$HOME/.npm-global/bin:$PATH"\nfi\n' >> "$HOME/.profile"
        fi
      fi

      # Add ~/sandboxes/lucos_agent to PATH so gh-as-agent, git-as-agent, etc.
      # are available as bare commands in both interactive and login shells.
      if ! grep -q 'lucos_agent' "$HOME/.profile"; then
        printf '\n# lucos_agent scripts (gh-as-agent, git-as-agent, get-token, etc.)\nif [ -d "$HOME/sandboxes/lucos_agent" ] ; then\n    PATH="$HOME/sandboxes/lucos_agent:$PATH"\nfi\n' >> "$HOME/.profile"
      fi
      if ! grep -q 'lucos_agent' "$HOME/.bashrc"; then
        printf '\n# lucos_agent scripts (gh-as-agent, git-as-agent, get-token, etc.)\nif [ -d "$HOME/sandboxes/lucos_agent" ] ; then\n    PATH="$HOME/sandboxes/lucos_agent:$PATH"\nfi\n' >> "$HOME/.bashrc"
      fi

      # Use SSH for all GitHub operations (HTTPS won't work without tokens)
      git config --global url."git@github.com:".insteadOf "https://github.com/"

      # Sensible git defaults
      git config --global init.defaultBranch main
      git config --global pull.rebase false

      # Create sandboxes directory for repository checkouts
      mkdir -p "$HOME/sandboxes"

      # Install production SSH host keys on every boot.
      # ~/.ssh/known_hosts can be cleared between Lima sessions; installing the
      # keys here (from the embedded ssh/known_hosts data file) ensures SSH to
      # production hosts works without requiring a manual ssh-keyscan each time.
      mkdir -p "$HOME/.ssh"
      chmod 700 "$HOME/.ssh"
      KNOWN_HOSTS="$HOME/.ssh/known_hosts"
      REPO_KNOWN_HOSTS="$HOME/ssh/known_hosts"
      if [ -f "$REPO_KNOWN_HOSTS" ]; then
        while IFS= read -r line; do
          if [ -n "$line" ] && ! grep -qF "$line" "$KNOWN_HOSTS" 2>/dev/null; then
            echo "$line" >> "$KNOWN_HOSTS"
          fi
        done < "$REPO_KNOWN_HOSTS"
        chmod 600 "$KNOWN_HOSTS"
      fi


      # Export credentials from lucos_agent .env (provides KEY_LUCOS_ARACHNE etc for MCP)
      if ! grep -q 'lucos_agent/.env' "$HOME/.bashrc"; then
        printf '\n# Export credentials from lucos_agent .env (provides KEY_LUCOS_ARACHNE etc for MCP)\nif [ -f "$HOME/sandboxes/lucos_agent/.env" ]; then\n    set -a\n    source "$HOME/sandboxes/lucos_agent/.env"\n    set +a\nfi\n' >> "$HOME/.bashrc"
      fi

      # Default interactive shells to ~/sandboxes
      if ! grep -q 'cd ~/sandboxes' "$HOME/.bashrc"; then
        printf '\n# Default to the sandboxes directory for interactive sessions\ncd ~/sandboxes\n' >> "$HOME/.bashrc"
      fi

      # Create ~/sandboxes/.mcp.json for arachne MCP server authentication.
      # Uses ${KEY_LUCOS_ARACHNE} which is expanded from the environment at runtime.
      # This must live in .mcp.json (not settings.json) — Claude Code only supports
      # ${VAR} expansion in headers for .mcp.json files.
      if [ ! -f "$HOME/sandboxes/.mcp.json" ]; then
        cat > "$HOME/sandboxes/.mcp.json" <<'MCPEOF'
{
  "mcpServers": {
    "arachne": {
      "type": "http",
      "url": "https://arachne.l42.eu/mcp",
      "headers": {
        "Authorization": "Bearer ${KEY_LUCOS_ARACHNE}"
      }
    }
  }
}
MCPEOF
      fi

      # Set up cron jobs for Claude agent maintenance tasks.
      # We use a temp file and install idempotently — if an entry is already present
      # it won't be duplicated.
      CRON_TMP=$(mktemp)
      crontab -l 2>/dev/null > "$CRON_TMP" || true

      COMMIT_ENTRY="*/15 * * * * $HOME/.claude/scripts/commit-agent-memory.sh >> $HOME/.claude/scripts/commit-agent-memory.log 2>&1"
      if ! grep -qF "commit-agent-memory.sh" "$CRON_TMP"; then
        echo "$COMMIT_ENTRY" >> "$CRON_TMP"
      fi

      PRUNE_ENTRY="*/15 * * * * $HOME/.claude/scripts/prune-inboxes.sh >> $HOME/.claude/scripts/prune-inboxes.log 2>&1"
      if ! grep -qF "prune-inboxes.sh" "$CRON_TMP"; then
        echo "$PRUNE_ENTRY" >> "$CRON_TMP"
      fi

      crontab "$CRON_TMP"
      rm -f "$CRON_TMP"

      echo "Provision complete."
      echo "Run ~/setup-repos.sh to generate your SSH key and clone all repositories."
